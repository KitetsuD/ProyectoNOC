services:
  db:
    image: postgres:16-alpine
    container_name: proyectonoc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-proyectonoc}
      POSTGRES_USER: ${DATABASE_USER:-proyectonoc_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-proyectonoc_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-proyectonoc_user} -d ${DATABASE_NAME:-proyectonoc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: proyectonoc_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-3} --timeout $${GUNICORN_TIMEOUT:-120}"
    env_file:
      - .env
    ports:
      - "8003:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
